  <!-- NUEVO QUIZ -->
  <section class="quiz-section" id="juego">

    <div id="quiz-container">

      <!-- INTRO -->
      <div id="screen-intro" class="quiz-screen">
        <h2 class="section-title quiz-title">
          ¿Cuánto sabes de Nutrición Emocional?
        </h2>

        <p class="quiz-desc">
          Demuestra que sabes elegir el snack correcto para cada emoción y suma puntos.
        </p>

        <button class="hero-cta" onclick="startQuiz()">
          Empezar Desafío
        </button>
      </div>

      <!-- GAME -->
      <div id="screen-game" class="quiz-screen hidden">

        <div class="quiz-topbar">
          <span>Puntos: <span id="score">0</span></span>
          <span>Pregunta: <span id="question-number">1</span>/3</span>
        </div>

        <h3 id="question-text" class="quiz-question">
          Cargando pregunta...
        </h3>

        <div id="options-container"></div>

      </div>

      <!-- RESULTS -->
      <div id="screen-results" class="quiz-screen hidden">

        <h2 class="section-title quiz-title">
          ¡Desafío Completado!
        </h2>

        <p class="quiz-score">
          Tu puntaje final es:
          <span id="final-score">0</span>
        </p>

        <div id="feedback-final"></div>

        <button class="hero-cta retry-btn" onclick="resetQuiz()">
          Intentar de nuevo
        </button>

      </div>

    </div>
  </section>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
